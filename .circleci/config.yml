version: 2.1

executors:
  node-executor:
    docker:
      - image: cimg/node:22.18.0
    working_directory: ~/aiunlocked

jobs:
  install-deps:
    executor: node-executor
    steps:
      - checkout
      - run:
          name: Install Dependencies
          command: npm ci

  lint:
    executor: node-executor
    steps:
      - checkout
      - run:
          name: Lint Codebase
          command: npm run lint

  test:
    executor: node-executor
    steps:
      - checkout
      - run:
          name: Run Tests
          command: npm run test -- --ci

  build:
    executor: node-executor
    steps:
      - checkout
      - run:
          name: Build Project
          command: npm run build

  deploy:
    executor: node-executor
    steps:
      - checkout
      - run:
          name: Firebase Deploy
          command: |
            npm install -g firebase-tools
            firebase deploy --only hosting --token $FIREBASE_TOKEN

workflows:
  version: 2
  aiunlocked-ci:
    jobs:
      - install-deps
      - lint:
          requires:
            - install-deps
      - test:
          requires:
            - install-deps
      - build:
          requires:
            - lint
            - test
      - deploy:
          requires:
            - build
          filters:
            branches:
              only: main
